<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Helix QMS — UI Kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: #fafaf9; font-family: Inter, system-ui, sans-serif; color: #1a1a18; }
  @keyframes hqpulse { 0%,100% { opacity: .4 } 50% { opacity: 1 } }
  /* hide scroll on body when sidebar is sticky */
  ::-webkit-scrollbar { width: 8px; height: 8px }
  ::-webkit-scrollbar-thumb { background: #d8d8d0; border-radius: 4px }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Helix QMS UI Kit">
<div id="root"></div>

<script type="text/babel" src="Icon.jsx"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="TopBar.jsx"></script>
<script type="text/babel" src="ScoreButtons.jsx"></script>
<script type="text/babel" src="CrownedCard.jsx"></script>
<script type="text/babel" src="QuestionCard.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>

<script type="text/babel">
const { useState } = React;

function App() {
  const [route, setRoute] = useState('dashboard');

  const crumbsByRoute = {
    dashboard: ['Helix QMS', 'Dashboard'],
    assessments: ['Helix QMS', 'Assessments'],
    detail: ['Helix QMS', 'Assessments', 'Internal Audit — Plant 03'],
    ncrs: ['Helix QMS', 'Non-Conformities'],
    reports: ['Helix QMS', 'Reports'],
    standards: ['Helix QMS', 'Standards'],
    users: ['Helix QMS', 'Users'],
  };

  const renderScreen = () => {
    if (route === 'dashboard') return <window.HQ.DashboardScreen onOpenAssessment={() => setRoute('detail')} />;
    if (route === 'assessments') return <window.HQ.AssessmentsScreen onOpenAssessment={() => setRoute('detail')} />;
    if (route === 'detail') return <window.HQ.AssessmentDetailScreen />;
    if (route === 'ncrs') return <window.HQ.NCRsScreen />;
    return (
      <div style={{padding:'80px 32px',display:'flex',flexDirection:'column',alignItems:'center',gap:14,color:'#7a7a70'}}>
        <div style={{width:64,height:64,borderRadius:18,background:'#f5f5f3',display:'grid',placeItems:'center',color:'#557349'}}>
          <window.HQ.Icon name="paper" size={28} />
        </div>
        <h2 style={{font:'700 22px Poppins',color:'#0f172a',margin:0}}>{route.charAt(0).toUpperCase() + route.slice(1)}</h2>
        <p style={{font:'400 13px Inter',color:'#7a7a70',margin:0,maxWidth:340,textAlign:'center',lineHeight:1.55}}>This screen is part of the kit but isn't recreated in this prototype. Check the README for the screens that are.</p>
      </div>
    );
  };

  return (
    <div style={{display:'flex',minHeight:'100vh',background:'#fafaf9'}}>
      <window.HQ.Sidebar active={route === 'detail' ? 'assessments' : route} onNav={setRoute} />
      <main style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
        <window.HQ.TopBar
          crumbs={crumbsByRoute[route]}
          saveStatus={route === 'detail' ? 'saved' : null}
        />
        {renderScreen()}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
