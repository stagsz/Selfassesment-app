<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--surface-50)}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;max-width:340px}
.lbl{font:500 13px var(--font-sans);color:#474743}
.in{height:40px;padding:0 14px;border-radius:12px;border:1px solid #ddddd9;background:#fff;font:400 14px Inter;color:#1a1a18;outline:none;transition:all .2s}
.in:hover{border-color:#b8b8b3}
.in:focus{border-color:transparent;box-shadow:0 0 0 2px #fff,0 0 0 4px #8baa7e}
.err .in{border-color:#fca5a5;background:rgba(254,242,242,.3)}
.err .msg{font:400 12px var(--font-sans);color:#dc2626;display:flex;gap:4px;align-items:center;margin-top:2px}
textarea.in{height:auto;min-height:80px;padding:10px 14px;line-height:1.5;font-family:Inter,sans-serif;resize:vertical}
</style></head><body>
<div class="field"><label class="lbl">Email address</label><input class="in" placeholder="you@company.com" value="auditor@org.io"/></div>
<div class="field err"><label class="lbl">Password</label><input class="in" type="password" value="•••"/><div class="msg">⚠ Password must be at least 8 characters</div></div>
<div class="field"><label class="lbl">Justification <span style="color:#dc2626;font-weight:600;font-size:11px">(Required)</span></label><textarea class="in" placeholder="Please explain why this item is not fully compliant…"></textarea></div>
</body></html>
