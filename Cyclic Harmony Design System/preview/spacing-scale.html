<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--surface-50)}
.row{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap}
.box{background:#557349;border-radius:6px;color:#fff;display:flex;align-items:center;justify-content:center;font:600 11px Inter,monospace}
.lbl{font:500 11px var(--font-sans);color:var(--muted-foreground);margin-top:6px;text-align:center}
.c{display:flex;flex-direction:column;align-items:center}
</style></head><body>
<div class="row">
  <div class="c"><div class="box" style="width:4px;height:4px"></div><div class="lbl">4</div></div>
  <div class="c"><div class="box" style="width:8px;height:8px"></div><div class="lbl">8</div></div>
  <div class="c"><div class="box" style="width:12px;height:12px"></div><div class="lbl">12</div></div>
  <div class="c"><div class="box" style="width:16px;height:16px"></div><div class="lbl">16</div></div>
  <div class="c"><div class="box" style="width:24px;height:24px"></div><div class="lbl">24</div></div>
  <div class="c"><div class="box" style="width:32px;height:32px"></div><div class="lbl">32</div></div>
  <div class="c"><div class="box" style="width:48px;height:48px"></div><div class="lbl">48</div></div>
  <div class="c"><div class="box" style="width:64px;height:64px"></div><div class="lbl">64</div></div>
</div>
<p style="font:400 12px var(--font-sans);color:var(--muted-foreground);margin:18px 2px 0;line-height:1.5">
4px grid. Cards pad at 32 (p-8). Section gaps at 24. Major page regions at 32–48.
</p>
</body></html>
