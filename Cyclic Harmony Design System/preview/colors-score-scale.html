<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--surface-50)}
.row{display:flex;gap:10px;flex-wrap:wrap}
.b{display:flex;flex-direction:column;align-items:center;justify-content:center;width:90px;height:90px;border-radius:14px;border:2px solid;font:700 24px var(--font-display);gap:2px}
.b small{font:500 10px var(--font-sans);text-align:center;line-height:1.1}
</style></head><body>
<div class="row">
  <div class="b" style="background:#f3f4f6;border-color:#d1d5db;color:#4b5563">N/A<small>Not Applicable</small></div>
  <div class="b" style="background:#fef2f2;border-color:#fecaca;color:#b91c1c">1<small>Non-Compliant</small></div>
  <div class="b" style="background:#fff7ed;border-color:#fed7aa;color:#c2410c">2<small>Initial</small></div>
  <div class="b" style="background:#fefce8;border-color:#fde68a;color:#a16207">3<small>Developing</small></div>
  <div class="b" style="background:#f0fdf4;border-color:#bbf7d0;color:#15803d">4<small>Established</small></div>
  <div class="b" style="background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8">5<small>Optimizing</small></div>
</div>
<p style="font:400 12px var(--font-sans);color:var(--muted-foreground);margin:14px 2px 0;line-height:1.5">
The 0–5 ISO scoring scale. Each button has a soft tint background, 2px coloured border, large numeric label, and small caption. Selected state inverts to filled colour with a 2px ring offset.
</p>
</body></html>
