<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--surface-50);}
.row{display:flex;border-radius:var(--radius-card);overflow:hidden;box-shadow:var(--shadow-1);background:#fff}
.s{flex:1;height:90px;display:flex;align-items:flex-end;padding:8px 10px;font:500 11px var(--font-sans)}
.s .h{font-family:ui-monospace,monospace;font-size:10px;opacity:.85}
.s .n{font-weight:600;font-size:12px}
.lbl{font:600 11px/1 var(--font-sans);letter-spacing:.08em;text-transform:uppercase;color:var(--muted-foreground);margin:0 0 8px 2px}
.col{display:flex;flex-direction:column}
</style></head><body>
<div class="lbl">Surface — Warm Neutrals</div>
<div class="row">
  <div class="s" style="background:#fafaf9;color:#252523"><div class="col"><span class="n">50</span><span class="h">#fafaf9</span></div></div>
  <div class="s" style="background:#f5f5f3;color:#252523"><div class="col"><span class="n">100</span><span class="h">#f5f5f3</span></div></div>
  <div class="s" style="background:#ececea;color:#252523"><div class="col"><span class="n">200</span><span class="h">#ececea</span></div></div>
  <div class="s" style="background:#ddddd9;color:#252523"><div class="col"><span class="n">300</span><span class="h">#ddddd9</span></div></div>
  <div class="s" style="background:#b8b8b3;color:#252523"><div class="col"><span class="n">400</span><span class="h">#b8b8b3</span></div></div>
  <div class="s" style="background:#98988f;color:#fff"><div class="col"><span class="n">500</span><span class="h">#98988f</span></div></div>
  <div class="s" style="background:#7a7a70;color:#fff"><div class="col"><span class="n">600</span><span class="h">#7a7a70</span></div></div>
  <div class="s" style="background:#64645c;color:#fff"><div class="col"><span class="n">700</span><span class="h">#64645c</span></div></div>
  <div class="s" style="background:#53534d;color:#fff"><div class="col"><span class="n">800</span><span class="h">#53534d</span></div></div>
  <div class="s" style="background:#474743;color:#fff"><div class="col"><span class="n">900</span><span class="h">#474743</span></div></div>
  <div class="s" style="background:#252523;color:#fff"><div class="col"><span class="n">950</span><span class="h">#252523</span></div></div>
</div>
</body></html>
