<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#D8D8D0;font-family:var(--font-sans)}
.flow{display:flex;align-items:center;gap:0}
.card{position:relative;background:#fff;border-radius:24px;box-shadow:var(--shadow-crown);width:120px;flex-shrink:0;overflow:visible}
.crown{position:relative;width:100%;padding-top:45%;overflow:hidden;border-radius:24px 24px 0 0}
.crown::before{content:"";position:absolute;inset:0;clip-path:ellipse(50% 100% at 50% 0%)}
.c-sage::before{background:#8BAA7E}
.c-lime::before{background:#A8C499}
.c-grad::before{background:linear-gradient(180deg,#A8C499,#8BAA7E,#5C7C52)}
.c-forest::before{background:#3D5A3A}
.body{padding:14px 10px;text-align:center}
.body .ic{display:flex;justify-content:center;margin:-6px 0 8px}
.t{font:700 11px Poppins;color:#333;line-height:1.2;margin:0 0 4px;height:28px;display:flex;align-items:center;justify-content:center}
.n{font:600 11px Poppins}
.connector{margin:0 -8px;flex-shrink:0}
.checkmark{position:absolute;top:8px;right:8px;width:22px;height:22px;background:#3D5A3A;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:var(--shadow-1)}
</style></head><body>
<div class="flow">
  <div class="card" style="opacity:1">
    <div class="crown c-forest"></div>
    <div class="checkmark"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg></div>
    <div class="body"><div class="ic" style="color:#3D5A3A"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div><div class="t">Context</div><div class="n" style="color:#3D5A3A">04</div></div>
  </div>
  <svg class="connector" width="48" height="40" viewBox="0 0 64 96"><path d="M 8 48 Q 32 20, 56 48" stroke="#3D5A3A" stroke-width="2" stroke-dasharray="6 6" stroke-linecap="round" fill="none"/></svg>
  <div class="card">
    <div class="crown c-grad"></div>
    <div class="body"><div class="ic" style="color:#5C7C52"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><div class="t">Leadership</div><div class="n" style="color:#5C7C52">05</div></div>
  </div>
  <svg class="connector" width="48" height="40" viewBox="0 0 64 96"><path d="M 8 48 Q 32 20, 56 48" stroke="#8BAA7E" stroke-width="2" stroke-dasharray="6 6" stroke-linecap="round" fill="none"/></svg>
  <div class="card" style="opacity:.6"><div class="crown c-lime"></div><div class="body"><div class="ic" style="color:#8BAA7E"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div><div class="t">Planning</div><div class="n" style="color:#8BAA7E">06</div></div></div>
  <svg class="connector" width="48" height="40" viewBox="0 0 64 96"><path d="M 8 48 Q 32 20, 56 48" stroke="#D8D8D0" stroke-width="2" stroke-dasharray="6 6" stroke-linecap="round" fill="none"/></svg>
  <div class="card" style="opacity:.4"><div class="crown c-sage"></div><div class="body"><div class="ic" style="color:#8BAA7E"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2 4 4 8-8 4 4"/></svg></div><div class="t">Support</div><div class="n" style="color:#8BAA7E">07</div></div></div>
</div>
<p style="font:400 11px Inter;color:#64645c;margin:14px 2px 0;line-height:1.4">Process flow with crowned stage cards and dotted-arc connectors. Status: completed → active → in-progress → pending.</p>
</body></html>
