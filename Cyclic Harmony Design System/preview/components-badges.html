<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--surface-50)}
.row{display:flex;gap:10px;flex-wrap:wrap}
.b{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:9999px;font:500 12px Inter}
.dot{width:6px;height:6px;border-radius:50%}
</style></head><body>
<div class="row">
  <span class="b" style="background:#f3f4f6;color:#4b5563"><span class="dot" style="background:#9ca3af"></span>Draft</span>
  <span class="b" style="background:#fef3c7;color:#92400e"><span class="dot" style="background:#f59e0b"></span>In Progress</span>
  <span class="b" style="background:#dbeafe;color:#1e40af"><span class="dot" style="background:#3b82f6"></span>Under Review</span>
  <span class="b" style="background:#dcfce7;color:#15803d"><span class="dot" style="background:#22c55e"></span>Completed</span>
  <span class="b" style="background:#e6ede4;color:#384b32"><span class="dot" style="background:#557349"></span>Verified</span>
  <span class="b" style="background:#fef2f2;color:#b91c1c"><span class="dot" style="background:#ef4444"></span>Major NCR</span>
  <span class="b" style="background:#fff7ed;color:#c2410c"><span class="dot" style="background:#f97316"></span>Minor NCR</span>
  <span class="b" style="background:#f5f5f3;color:#64645c">Archived</span>
</div>
<div class="row" style="margin-top:14px">
  <span style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:9999px;background:#dcfce7;color:#15803d;font:500 12px Inter">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>Saved · 30s ago
  </span>
  <span style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:9999px;background:#fef3c7;color:#92400e;font:500 12px Inter">
    <span style="width:8px;height:8px;border-radius:50%;background:#f59e0b;animation:p 2s infinite"></span>Saving… 3 pending
  </span>
  <style>@keyframes p{0%,100%{opacity:.4}50%{opacity:1}}</style>
</div>
</body></html>
