<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--surface-50);}
.row{display:flex;gap:0;border-radius:var(--radius-card);overflow:hidden;box-shadow:var(--shadow-1);background:#fff}
.s{flex:1;height:90px;display:flex;align-items:flex-end;padding:8px 10px;color:#fff;font:500 11px var(--font-sans)}
.s .h{font-family:ui-monospace,monospace;font-size:10px;opacity:.85}
.s .n{font-weight:600;font-size:12px}
.lbl{font:600 11px/1 var(--font-sans);letter-spacing:.08em;text-transform:uppercase;color:var(--muted-foreground);margin:0 0 8px 2px}
.col{display:flex;flex-direction:column}
</style></head><body>
<div class="lbl">Sage — Primary</div>
<div class="row">
  <div class="s" style="background:#f4f7f3;color:#2e3e2a"><div class="col"><span class="n">50</span><span class="h">#f4f7f3</span></div></div>
  <div class="s" style="background:#e6ede4;color:#2e3e2a"><div class="col"><span class="n">100</span><span class="h">#e6ede4</span></div></div>
  <div class="s" style="background:#cddbc9;color:#2e3e2a"><div class="col"><span class="n">200</span><span class="h">#cddbc9</span></div></div>
  <div class="s" style="background:#a8c499;color:#2e3e2a"><div class="col"><span class="n">300</span><span class="h">#a8c499</span></div></div>
  <div class="s" style="background:#8baa7e"><div class="col"><span class="n">400</span><span class="h">#8baa7e</span></div></div>
  <div class="s" style="background:#6b8f5e"><div class="col"><span class="n">500</span><span class="h">#6b8f5e</span></div></div>
  <div class="s" style="background:#557349"><div class="col"><span class="n">600</span><span class="h">#557349</span></div></div>
  <div class="s" style="background:#445c3b"><div class="col"><span class="n">700</span><span class="h">#445c3b</span></div></div>
  <div class="s" style="background:#384b32"><div class="col"><span class="n">800</span><span class="h">#384b32</span></div></div>
  <div class="s" style="background:#2e3e2a"><div class="col"><span class="n">900</span><span class="h">#2e3e2a</span></div></div>
  <div class="s" style="background:#172015"><div class="col"><span class="n">950</span><span class="h">#172015</span></div></div>
</div>
</body></html>
