<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--surface-50);font-family:var(--font-sans)}
.q{background:#fff;border:1px solid #ddddd9;border-left:4px solid #f97316;background:rgba(255,247,237,.3);border-radius:16px;padding:18px 22px}
.head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
.tag{display:inline-flex;align-items:center;padding:2px 10px;border-radius:9999px;background:#dcfce7;color:#166534;font:500 11px Inter}
.score-pill{padding:4px 12px;border-radius:12px;background:#ffedd5;color:#9a3412;font:500 13px Inter}
.text{font:500 14px Inter;color:#0f172a;margin:0;line-height:1.5}
.guide{display:flex;gap:8px;background:#eff6ff;border:1px solid #dbeafe;border-radius:12px;padding:10px 12px;margin-top:12px}
.guide-l{font:600 11px Inter;color:#1d4ed8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.guide-t{font:400 13px Inter;color:#1e40af;line-height:1.5}
</style></head><body>
<div class="q">
  <div class="head">
    <div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px"><span class="tag">4.1.1</span><span style="font:400 11px Inter;color:#64748b">Ref: ISO 9001:2015 §4.1</span></div>
      <p class="text">Has the organization determined external and internal issues relevant to its purpose?</p>
    </div>
    <span class="score-pill">Initial</span>
  </div>
  <div class="guide">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" style="flex-shrink:0;margin-top:2px"><circle cx="12" cy="12" r="10"/><path d="M12 17v.01M12 7v6"/></svg>
    <div><div class="guide-l">Auditor Guidance</div><div class="guide-t">Look for SWOT analysis, environmental scans, or stakeholder mapping documents dated within the last 12 months.</div></div>
  </div>
</div>
</body></html>
